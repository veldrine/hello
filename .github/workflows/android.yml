name: tauri android

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # 🔥 INI YANG BEDAIN DEBUG VS RELEASE
      - name: Build Debug APK
        run: npx tauri android build --debug

      - name: Find APK
        run: find src-tauri/gen/android -type f -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tauri-debug-apk
          path: "**/*.apk"